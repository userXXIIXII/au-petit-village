<!-- Barre de recherche -->

<input type="text" placeholder="Rechercher une figurine..." [(ngModel)]="searchTerm"/>

<!-- Affichage avec filtrage et tri combinés-->

<div *ngFor="let product of products | filterByName:searchTerm | sortbyPrice:'asc'">
    <h3>{{ product.name }}</h3>
    <p>{{ product.price }}</p>
</div>
