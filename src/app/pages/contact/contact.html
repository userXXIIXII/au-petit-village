<div class="contact-container">
    <h2>Nous contacter</h2>
    <p>Une question sur une figurine ? Écrivez-nous !</p>

    <form class="contact-form">
        <div class="form-group">
        <label for="name">Votre nom</label>
        <input type="text" id="name" placeholder="Astérix">
    </div>

    <div class="form-group">
        <label for="email">Votre e-mail</label>
        <input type="email" id="email" placeholder="asterix@village.fr">
    </div>

    <div class="form-group">
        <label for="message">Votre message</label>
        <textarea id="message" rows="5" placeholder="Bonjour..."></textarea>
    </div>

    <button type="button" class="btn-submit">Envoyer</button>
    </form>
</div>
